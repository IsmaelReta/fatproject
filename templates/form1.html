{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <header class="border-bottom border-4">
        <nav class="navbar navbar-light" style="background-color: #B3B2B2;">
            <div class="container-fluid">
              <a class="navbar-brand" href="{% url 'home' %}"> <img src="{% static 'logopfq.png' %}" alt="LOGO" width="90" height="75" class="d-inline-block align-text-center">Inicio</a>
                <span class="navbar-text">Perfil Nombre</span>
            </div>
        </nav>
    </header>
    <main style="height:700px;">
      <aside class="w-25 mt-3 float-end border-start border-4" style="background-color:#E2E3E8; border-color: #9C4183; height: 600px;">
        <form class="d-flex flex-column align-items-stretch">
          <div class="mb-3">
            <label for="inputFdr" class="mt-5 d-flex justify-content-center form-label">Fecha de Retiro</label>
            <input type="date" class="form-control" id="inputFdr">
          </div>
          <div class="mb-3">
            <label for="formFileLg" class="mt-5 d-flex justify-content-center form-label">Certificado unico de discapacidad</label>
            <input class="form-control form-control-lg" id="formFileLg" type="file">
          </div>
          <div>
            <label class="mt-5 mb-2 d-flex justify-content-center">Caracteristica del Pedido</label>
            <select class="form-select form-select-lg mb-3" aria-label=".form-select-lg example">
              <option selected>Medicacion</option>
              <option value="1">Dispositivos</option>
              <option value="2">Asesoramiento</option>
              <option value="3">Kits Quirurgicos</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
      </aside>
        <form class="row g-3 w-75">
            <p class="h4 mt-4">Datos Personales</p>
            <hr class="my-0 me-5" style="background-color: #D2E312; height: 5px;">
            <div class="col-md-4">
              <label for="inputNombre" class="form-label">Nombre</label>
              <input type="text" class="form-control" id="inputNombre">
            </div>
            <div class="col-4">
              <label for="inputApellido" class="form-label">Apellido</label>
              <input type="text" class="form-control" id="inputApellido">
            </div>
            <div class="col-md-4">
                <label for="inputEmail4" class="form-label">Email</label>
                <input type="email" class="form-control" id="inputEmail4">
            </div>
            <div class="col-4">
              <label for="inputDNI" class="form-label">DNI</label>
              <input type="number" class="form-control" id="inputDNI">
            </div>
            <div class="col-md-4">
              <label for="inputTel" class="form-label">Telefono</label>
              <input type="tel" class="form-control" id="inputTel">
            </div>
            <div class="col-md-4">
              <label for="inputState" class="form-label">Provincia / Ciudad</label>
              <input type="text" class="form-control" id="inputState">
            </div>
          </form>
          <form class="row g-3 w-75">
            <p class="h4 mt-4">Datos del Paciente</p>
            <hr class="my-0" style="background-color: #9C4183; height: 5px;">
            <div class="col-md-6">
              <label for="inputNombre" class="form-label">Nombre</label>
              <input type="text" class="form-control" id="inputNombre">
            </div>
            <div class="col-6">
              <label for="inputApellido" class="form-label">Apellido</label>
              <input type="text" class="form-control" id="inputApellido">
            </div>
            <div class="col-md-6">
                <label for="inputObSocial" class="form-label">Obra Social</label>
                <input type="text" class="form-control" id="inputObSocial">
            </div>
            <div class="col-md-6">
              <label for="inputHos" class="form-label">Hospital al que atiende</label>
              <input type="text" class="form-control" id="inputHos">
            </div>
            <div class="col-6">
              <label for="inputDetpedi" class="form-label">Detalle del Pedido (Necesidad del Paciente)</label>
              <textarea class="form-control" id="inputDetpedi" rows="4"></textarea>
            </div>
            <div class="col-md-6">
              <label for="inputMotivos" class="form-label">Motivos por el cual no tiene acceso a la medicacion</label>
              <textarea class="form-control" id="inputMotivos" rows="4"></textarea>
            </div>
          </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
